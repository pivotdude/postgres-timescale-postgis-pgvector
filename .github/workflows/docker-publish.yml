name: Docker CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres_version: ["17", "18"]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image names
        id: prep
        run: |
          REPO_OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_NAME_LC="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "ghcr_image=ghcr.io/${REPO_OWNER_LC}/${REPO_NAME_LC}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${REPO_NAME_LC}" >> "$GITHUB_OUTPUT"

      - name: Prepare tags
        id: tags
        run: |
          GHCR_IMAGE="${{ steps.prep.outputs.ghcr_image }}"
          DOCKERHUB_IMAGE="${{ steps.prep.outputs.dockerhub_image }}"
          PG_VERSION="${{ matrix.postgres_version }}"

          {
            echo "tags<<EOF"
            echo "${GHCR_IMAGE}:${PG_VERSION}"
            echo "${DOCKERHUB_IMAGE}:${PG_VERSION}"
            if [ "${PG_VERSION}" = "18" ]; then
              echo "${GHCR_IMAGE}:latest"
              echo "${DOCKERHUB_IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            POSTGRES_VERSION=${{ matrix.postgres_version }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
